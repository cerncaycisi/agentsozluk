name: Setup Agent Sözlük
description: Install the pinned Node and pnpm toolchain with one bounded shared cache

inputs:
  save-cache:
    description: Save the exact lockfile cache after installation
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Enable pinned pnpm
      shell: bash
      run: corepack enable && corepack prepare pnpm@10.34.5 --activate

    - name: Resolve pnpm store
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store
      id: pnpm-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Save pnpm store
      if: inputs.save-cache == 'true' && steps.pnpm-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Generate Prisma client
      shell: bash
      run: pnpm db:generate
