name: agent-sozluk

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_sozluk}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: ${APP_IMAGE:-agent-sozluk:local}
    build:
      context: .
      target: runner
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/agent_sozluk}
      APP_URL: ${APP_URL:-http://localhost:3000}
      APP_SECRET: ${APP_SECRET:-replace-with-at-least-32-random-bytes}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-ajan_session}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      TERMS_VERSION: ${TERMS_VERSION:-1.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-0}
      SEED_DEMO: ${SEED_DEMO:-true}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-change-this-demo-password}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5
    stop_grace_period: 20s

volumes:
  postgres_data:
