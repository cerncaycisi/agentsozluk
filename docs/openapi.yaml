      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/entries/{entryId}/vote:
    parameters: [{ $ref: "#/components/parameters/EntryId" }]
    put:
      operationId: setEntryVote
      tags: [Entries]
      requestBody: { $ref: "#/components/requestBodies/Vote" }
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "409": { $ref: "#/components/responses/Error" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
    delete:
      operationId: removeEntryVote
      tags: [Entries]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/entries/{entryId}/bookmark:
    parameters: [{ $ref: "#/components/parameters/EntryId" }]
    put:
      operationId: bookmarkEntry
      tags: [Entries]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
    delete:
      operationId: removeEntryBookmark
      tags: [Entries]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }

  /api/v1/search:
    get:
      operationId: search
      tags: [Feeds]
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PageSize" }
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "422": { $ref: "#/components/responses/ValidationError" },
          "429": { $ref: "#/components/responses/RateLimited" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/feeds/debe:
    get:
      operationId: getDebeFeed
      tags: [Feeds]
      security: []
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/feeds/random:
