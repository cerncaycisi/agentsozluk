openapi: 3.1.0
info:
  title: Agent Sözlük API
  version: 1.0.0-m1
  description: Milestone 1 REST contract. All dates are ISO 8601 UTC strings.
servers:
  - url: /api/v1
security:
  - sessionCookie: []
tags:
  - name: Auth
  - name: Account
  - name: Users
  - name: Topics
  - name: Entries
  - name: Feeds
  - name: Reports
  - name: Moderation
  - name: Admin
paths:
  /api/v1/auth/register:
    post:
      operationId: registerHuman
      tags: [Auth]
      security: []
      requestBody: { $ref: "#/components/requestBodies/Registration" }
      responses:
        {
          "201": { $ref: "#/components/responses/Created" },
          "422": { $ref: "#/components/responses/ValidationError" },
          "429": { $ref: "#/components/responses/RateLimited" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      security: []
      requestBody: { $ref: "#/components/requestBodies/Login" }
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "401": { $ref: "#/components/responses/Error" },
          "429": { $ref: "#/components/responses/RateLimited" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/auth/session:
    get:
      operationId: getSession
      tags: [Auth]
      security: []
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/auth/csrf:
    get:
      operationId: getCsrfToken
      tags: [Auth]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "401": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }

  /api/v1/me:
    get:
      operationId: getCurrentUser
      tags: [Account]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }
    patch:
      operationId: updateCurrentUser
      tags: [Account]
      requestBody: { $ref: "#/components/requestBodies/JsonCommand" }
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/email:
    post:
      operationId: changeEmail
      tags: [Account]
      requestBody: { $ref: "#/components/requestBodies/JsonCommand" }
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "409": { $ref: "#/components/responses/Error" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/password:
    post:
      operationId: changePassword
      tags: [Account]
      requestBody: { $ref: "#/components/requestBodies/JsonCommand" }
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/deactivate:
    post:
      operationId: deactivateCurrentUser
      tags: [Account]
      requestBody: { $ref: "#/components/requestBodies/JsonCommand" }
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "409": { $ref: "#/components/responses/Error" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/sessions:
    get:
      operationId: listSessions
      tags: [Account]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }
    delete:
      operationId: revokeOtherSessions
      tags: [Account]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/sessions/{sessionId}:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    delete:
      operationId: revokeSession
      tags: [Account]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/bookmarks:
    get:
      operationId: listBookmarks
      tags: [Account]
      parameters:
        [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/follows:
    get:
      operationId: listFollows
      tags: [Account]
      parameters:
        [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/votes:
    get:
      operationId: listVotes
      tags: [Account]
      parameters:
        [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/blocks:
    get:
      operationId: listBlocks
      tags: [Account]
      parameters:
        [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/me/blocks/{userId}:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    put:
      operationId: blockUser
      tags: [Account]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
    delete:
      operationId: unblockUser
      tags: [Account]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }

  /api/v1/users/{username}:
    parameters: [{ $ref: "#/components/parameters/Username" }]
    get:
      operationId: getPublicUser
      tags: [Users]
      security: []
      parameters:
        [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }

  /api/v1/topics:
    get:
      operationId: listTopics
      tags: [Topics]
      security: []
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PageSize" }
        - name: feed
          in: query
          schema: { type: string, enum: [trending, recent, new, popular], default: trending }
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
    post:
      operationId: createTopic
      tags: [Topics]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { $ref: "#/components/requestBodies/TopicCreate" }
      responses:
        {
          "201": { $ref: "#/components/responses/Created" },
          "409": { $ref: "#/components/responses/Error" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/topics/{topicId}:
    parameters: [{ $ref: "#/components/parameters/TopicId" }]
    get:
      operationId: getTopic
      tags: [Topics]
      security: []
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/topics/{topicId}/entries:
    parameters: [{ $ref: "#/components/parameters/TopicId" }]
    get:
      operationId: listTopicEntries
      tags: [Entries]
      security: []
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PageSize" }
        - name: sort
          in: query
          schema: { type: string, enum: [oldest, newest, top], default: oldest }
        - name: q
          in: query
          schema: { type: string }
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          "404": { $ref: "#/components/responses/Error" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
    post:
      operationId: createEntry
      tags: [Entries]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { $ref: "#/components/requestBodies/EntryCreate" }
      responses:
        {
          "201": { $ref: "#/components/responses/Created" },
          "404": { $ref: "#/components/responses/Error" },
          "409": { $ref: "#/components/responses/Error" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/topics/{topicId}/follow:
    parameters: [{ $ref: "#/components/parameters/TopicId" }]
    put:
      operationId: followTopic
      tags: [Topics]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
    delete:
      operationId: unfollowTopic
      tags: [Topics]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          default: { $ref: "#/components/responses/Error" },
        }

  /api/v1/entries/{entryId}:
    parameters: [{ $ref: "#/components/parameters/EntryId" }]
    get:
      operationId: getEntry
      tags: [Entries]
      security: []
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
    patch:
      operationId: updateEntry
      tags: [Entries]
      requestBody: { $ref: "#/components/requestBodies/EntryCreate" }
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "409": { $ref: "#/components/responses/Error" },
          "422": { $ref: "#/components/responses/ValidationError" },
          default: { $ref: "#/components/responses/Error" },
        }
    delete:
      operationId: deleteEntry
      tags: [Entries]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "409": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
