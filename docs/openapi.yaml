        { $ref: "#/components/parameters/ReportId" },
        { $ref: "#/components/parameters/IdempotencyKey" },
      ]
    post:
      operationId: resolveReport
      tags: [Moderation]
      requestBody: { $ref: "#/components/requestBodies/ReportDecision" }
