      [
        { $ref: "#/components/parameters/EntryId" },
        { $ref: "#/components/parameters/IdempotencyKey" },
      ]
    post:
      {
        operationId: hideEntry,
        tags: [Moderation],
        requestBody: { $ref: "#/components/requestBodies/ModerationReason" },
        responses:
          {
            "200": { $ref: "#/components/responses/Success" },
