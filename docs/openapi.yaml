        }
  /api/v1/moderation/reports:
    get:
      operationId: listModerationReports
      tags: [Moderation]
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PageSize" }
        - name: status
          in: query
          schema: { type: string, enum: [OPEN, RESOLVED, REJECTED] }
        - name: targetType
          in: query
          schema: { type: string, enum: [TOPIC, ENTRY, USER] }
        - name: reason
          in: query
          schema:
            {
              type: string,
              enum:
                [
                  SPAM,
                  HARASSMENT,
                  HATE,
                  ILLEGAL_CONTENT,
                  PERSONAL_DATA,
                  COPYRIGHT,
                  OFF_TOPIC,
                  OTHER,
                ],
            }
        - name: reporter
          in: query
          schema: { type: string, minLength: 3, maxLength: 30 }
          description: Exact normalized reporter username.
        - { $ref: "#/components/parameters/CreatedFrom" }
        - { $ref: "#/components/parameters/CreatedTo" }
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          "403": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
