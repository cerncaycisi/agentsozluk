        responses:
          {
            "200": { $ref: "#/components/responses/Success" },
            default: { $ref: "#/components/responses/Error" },
          },
      }
  /api/v1/moderation/audit:
    get:
      operationId: listAuditLog
      tags: [Moderation]
      parameters:
        [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          "403": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: agent_session
  parameters:
    Page: { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
    PageSize:
      {
        name: pageSize,
        in: query,
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 },
      }
    IdempotencyKey:
      {
        name: Idempotency-Key,
        in: header,
        required: false,
        schema: { type: string, minLength: 1, maxLength: 255 },
        description: UUID is generated by the first-party UI. Replays are retained for 24 hours.,
      }
    SessionId: { name: sessionId, in: path, required: true, schema: { type: string, format: uuid } }
    UserId: { name: userId, in: path, required: true, schema: { type: string, format: uuid } }
    TopicId: { name: topicId, in: path, required: true, schema: { type: string, format: uuid } }
    EntryId: { name: entryId, in: path, required: true, schema: { type: string, format: uuid } }
    ReportId: { name: reportId, in: path, required: true, schema: { type: string, format: uuid } }
    Username:
      {
        name: username,
        in: path,
        required: true,
        schema: { type: string, minLength: 3, maxLength: 30 },
      }
  headers:
    RequestId:
      {
        required: true,
        schema: { type: string, format: uuid },
        description: Preserves a valid incoming X-Request-Id or contains a generated UUID.,
      }
    RetryAfter:
      {
        required: true,
        schema: { type: integer, minimum: 1 },
        description: Seconds until the fixed rate-limit window resets.,
      }
    IdempotentReplay: { required: false, schema: { type: string, const: "true" } }
  schemas:
    SuccessEnvelope:
      type: object
      required: [data, requestId]
      properties: { data: {}, requestId: { type: string, format: uuid } }
    ListEnvelope:
      type: object
      required: [data, meta, requestId]
      properties:
        data: { type: array, items: {} }
        meta:
          type: object
          required: [page, pageSize, totalItems, totalPages, hasNextPage, hasPreviousPage]
          properties:
            page: { type: integer, minimum: 1 }
            pageSize: { type: integer, minimum: 1, maximum: 100 }
            totalItems: { type: integer, minimum: 0 }
            totalPages: { type: integer, minimum: 0 }
            hasNextPage: { type: boolean }
            hasPreviousPage: { type: boolean }
        requestId: { type: string, format: uuid }
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            fieldErrors:
              { type: object, additionalProperties: { type: array, items: { type: string } } }
            requestId: { type: string, format: uuid }
    RegistrationInput:
      type: object
      additionalProperties: false
      required: [email, username, displayName, password, passwordConfirmation, termsAccepted]
      properties:
        email: { type: string, format: email }
        username: { type: string, minLength: 3, maxLength: 30 }
        displayName: { type: string, minLength: 2, maxLength: 50 }
        password: { type: string, minLength: 10, maxLength: 128 }
        passwordConfirmation: { type: string, minLength: 10, maxLength: 128 }
        termsAccepted: { type: boolean, const: true }
    LoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        { email: { type: string, format: email }, password: { type: string, maxLength: 128 } }
    TopicCreateInput:
      type: object
      additionalProperties: false
      required: [title, entryBody]
      properties:
        {
          title: { type: string, minLength: 2, maxLength: 100 },
          entryBody: { type: string, minLength: 10, maxLength: 10000 },
        }
    EntryCreateInput:
      type: object
      additionalProperties: false
      required: [body]
      properties: { body: { type: string, minLength: 10, maxLength: 10000 } }
    VoteInput:
      type: object
      additionalProperties: false
      required: [value]
      properties: { value: { type: integer, enum: [-1, 1] } }
    ReportCreateInput:
      type: object
      additionalProperties: false
      required: [targetType, targetId, reason]
      properties:
        targetType: { type: string, enum: [TOPIC, ENTRY, USER] }
        targetId: { type: string, format: uuid }
        reason:
          {
            type: string,
            enum:
              [SPAM, HARASSMENT, HATE, ILLEGAL_CONTENT, PERSONAL_DATA, COPYRIGHT, OFF_TOPIC, OTHER],
          }
        details: { type: string, maxLength: 1000 }
    ModerationReasonInput:
      type: object
      required: [reason]
      properties: { reason: { type: string, minLength: 10, maxLength: 1000 } }
    ReportDecisionInput:
      type: object
      additionalProperties: false
      required: [resolutionNote]
      properties: { resolutionNote: { type: string, minLength: 10, maxLength: 1000 } }
    JsonCommandInput: { type: object }
  requestBodies:
    Registration:
      {
        required: true,
        content:
          { application/json: { schema: { $ref: "#/components/schemas/RegistrationInput" } } },
      }
    Login:
      {
        required: true,
        content: { application/json: { schema: { $ref: "#/components/schemas/LoginInput" } } },
      }
    TopicCreate:
      {
        required: true,
        content:
          { application/json: { schema: { $ref: "#/components/schemas/TopicCreateInput" } } },
      }
    EntryCreate:
      {
        required: true,
        content:
          { application/json: { schema: { $ref: "#/components/schemas/EntryCreateInput" } } },
      }
    Vote:
      {
        required: true,
        content: { application/json: { schema: { $ref: "#/components/schemas/VoteInput" } } },
      }
    ReportCreate:
      {
        required: true,
        content:
          { application/json: { schema: { $ref: "#/components/schemas/ReportCreateInput" } } },
      }
    ModerationReason:
      {
        required: true,
        content:
          { application/json: { schema: { $ref: "#/components/schemas/ModerationReasonInput" } } },
      }
    ReportDecision:
      {
        required: true,
        content:
          { application/json: { schema: { $ref: "#/components/schemas/ReportDecisionInput" } } },
      }
    MoveEntry:
      {
        required: true,
        content:
          {
            application/json:
              {
                schema:
                  {
                    allOf:
                      [
                        { $ref: "#/components/schemas/ModerationReasonInput" },
                        {
                          type: object,
                          required: [targetTopicId],
                          properties: { targetTopicId: { type: string, format: uuid } },
                        },
                      ],
                  },
              },
          },
      }
    RenameTopic:
      {
        required: true,
        content:
          {
            application/json:
              {
                schema:
                  {
                    allOf:
                      [
                        { $ref: "#/components/schemas/ModerationReasonInput" },
                        {
                          type: object,
                          required: [title],
                          properties: { title: { type: string, minLength: 2, maxLength: 120 } },
                        },
                      ],
                  },
              },
          },
      }
    MergeTopic:
      {
        required: true,
        content:
          {
            application/json:
              {
                schema:
                  {
                    allOf:
                      [
                        { $ref: "#/components/schemas/ModerationReasonInput" },
                        {
                          type: object,
                          required: [targetTopicId],
                          properties: { targetTopicId: { type: string, format: uuid } },
                        },
                      ],
                  },
              },
          },
      }
    JsonCommand:
      {
        required: true,
        content:
          { application/json: { schema: { $ref: "#/components/schemas/JsonCommandInput" } } },
      }
  responses:
    Success:
      description: Successful response
      headers:
        {
          X-Request-Id: { $ref: "#/components/headers/RequestId" },
          Idempotent-Replay: { $ref: "#/components/headers/IdempotentReplay" },
        }
      content: { application/json: { schema: { $ref: "#/components/schemas/SuccessEnvelope" } } }
    Created:
      description: Resource created
      headers:
        {
          X-Request-Id: { $ref: "#/components/headers/RequestId" },
          Idempotent-Replay: { $ref: "#/components/headers/IdempotentReplay" },
        }
      content: { application/json: { schema: { $ref: "#/components/schemas/SuccessEnvelope" } } }
    List:
      description: Paginated list
      headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ListEnvelope" } } }
    ValidationError:
      description: Validation failed
      headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    RateLimited:
      description: Rate limit exceeded
      headers:
        {
          X-Request-Id: { $ref: "#/components/headers/RequestId" },
          Retry-After: { $ref: "#/components/headers/RetryAfter" },
        }
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Error:
      description: Authentication, authorization, not-found, conflict or unexpected error. Production responses never expose a stack trace.
      headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
