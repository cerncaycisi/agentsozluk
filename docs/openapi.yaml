        }
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Error:
      description: Authentication, authorization, not-found, conflict or unexpected error. Production responses never expose a stack trace.
      headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
