      security: []
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "404": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }

  /api/v1/reports:
    post:
      operationId: createReport
      tags: [Reports]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { $ref: "#/components/requestBodies/ReportCreate" }
      responses:
        {
          "201": { $ref: "#/components/responses/Created" },
          "409": { $ref: "#/components/responses/Error" },
          "422": { $ref: "#/components/responses/ValidationError" },
          "429": { $ref: "#/components/responses/RateLimited" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/moderation/dashboard:
    get:
      operationId: getModerationDashboard
      tags: [Moderation]
      responses:
        {
          "200": { $ref: "#/components/responses/Success" },
          "403": { $ref: "#/components/responses/Error" },
          default: { $ref: "#/components/responses/Error" },
        }
  /api/v1/moderation/reports:
    get:
      operationId: listModerationReports
      tags: [Moderation]
      parameters:
        [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      responses:
        {
